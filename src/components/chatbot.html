<button id="cg-launcher" aria-label="Abrir asistente CREAGRAFICA">
  <i class="fa-solid fa-comment-dots"></i>
</button>

<div id="cg-tooltip">💬 ¿Tienes alguna pregunta?</div>

<div id="cg-chat" role="dialog" aria-label="Asistente CREAGRAFICA">
  <div class="cgc-header">
    <div class="cgc-avatar">🎨</div>
    <div>
      <h3>Asistente CREAGRAFICA</h3>
      <p><span class="cgc-dot"></span>En línea ahora</p>
    </div>
    <button class="cgc-close" id="cg-close" aria-label="Cerrar chat">
      <i class="fas fa-times"></i>
    </button>
  </div>

  <div class="cgc-messages" id="cg-messages"></div>

  <div class="cgc-input-bar">
    <input type="text" id="cg-input" placeholder="Escribe tu pregunta..." autocomplete="off" />
    <button class="cgc-send" id="cg-send" aria-label="Enviar">
      <i class="fa-solid fa-paper-plane"></i>
    </button>
  </div>

  <div class="cgc-brand">Asistente virtual · <span>CREAGRAFICA</span></div>
</div>
